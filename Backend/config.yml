# =================================================================
# Llama-Swap Enterprise Configuration Matrix
# single source of truth for dependencies and model virtualization
# =================================================================

host: "127.0.0.1"
port: 1234
concurrency: 1

upstream:
  ttl: 300s
  health_check_interval: 2s

# -----------------------------------------------------------------
# API Routing Grid (Ollama names mapped to Hugging Face targets)
# -----------------------------------------------------------------
models:
  - name: "claude-opus-4-8"
  - profile: "profile-heavy-coder"
  - name: "claude-sonnet-4-6"
    profile: "profile-heavy-coder"
  - name: "gemma4-12b"
    profile: "profile-multimodal-reasoner"
  - name: "claude-haiku-4-5"
    profile: "profile-light-coder"

# -----------------------------------------------------------------
# Native Execution Profiles (Environment-Agnostic with variable contexts)
# -----------------------------------------------------------------
profiles:
  - name: "profile-heavy-coder"
    bin: "llama-server"
    args:
      - "--model"
      - "%USERPROFILE%/.ai/models/Qwen3.6-35B-A3B-Uncensored-HauhauCS-Aggressive-IQ4_NL.gguf"
      - "--ctx-size"
      - "8192"
      - "--n-gpu-layers"
      - "-1"
      - "--port"
      - "8080"
      - "--parallel"
      - "1"
      - "--cont-batching"
      - "--system-prompt-file"
      - "%USERPROFILE%/.ai/bin/system_prompt.txt"
    litellm_params:
      model: "HauhauCS/Qwen3.6-35B-A3B-Uncensored-HauhauCS-Aggressive/resolve/main/Qwen3.6-35B-A3B-Uncensored-HauhauCS-Aggressive-IQ4_NL.gguf"

  - name: "profile-multimodal-reasoner"
    bin: "llama-server"
    args:
      - "--model"
      - "%USERPROFILE%/.ai/models/gemma-4-12B-it-Q4_K_M.gguf"
      - "--ctx-size"
      - "4096"
      - "--n-gpu-layers"
      - "-1"
      - "--port"
      - "8081"
      - "--parallel"
      - "1"
      - "--cont-batching"
    litellm_params:
      model: "bartowski/gemma-4-12B-it-GGUF/resolve/main/gemma-4-12B-it-Q4_K_M.gguf"

  - name: "profile-light-coder"
    bin: "llama-server"
    args:
      - "--model"
      - "%USERPROFILE%/.ai/models/qwen2.5-coder-1.5b-instruct-q4_k_m.gguf"
      - "--ctx-size"
      - "4096"
      - "--n-gpu-layers"
      - "-1"
      - "--port"
      - "8082"
      - "--parallel"
      - "1"
      - "--cont-batching"
    litellm_params:
      model: "Qwen/Qwen2.5-Coder-1.5B-Instruct-GGUF/resolve/main/qwen2.5-coder-1.5b-instruct-q4_k_m.gguf"
