services:
  qdrant-node:
    image: qdrant/qdrant:latest
    container_name: qdrant-vector-engine
    ports:
      - '6333:6333'
      - '6334:6334'
    volumes:
      - qdrant_storage:/qdrant/storage
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 2GB
    environment:
      - QDRANT__STORAGE__PERFORMANCE__eMAX_SEARCH_THREADS=2
      - QDRANT__VECTORS__MEMMAP_THRESHOLD=0
    restart: unless-stopped

volumes:
  qdrant_storage:
    driver: local
